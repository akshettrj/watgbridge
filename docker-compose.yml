# Pass creds via CLI: TELEGRAM_BOT_TOKEN=xxx TELEGRAM_OWNER_ID=123 TELEGRAM_TARGET_CHAT_ID=-100… docker compose up -d
# Or use a file: docker compose --env-file .env up -d
#
# SQLite lives on the host under ./data (bind mount). Create the directory once: mkdir -p data
# Migrating from the old named volume sqlite_data: copy with:
#   docker compose down
#   docker run --rm -v "<project>_sqlite_data:/from" -v "$PWD/data:/to" alpine:3.22 cp -a /from/. /to/
#   (<project>_sqlite_data is from: docker volume ls | grep sqlite_data)
services:
  # SQLite is file-based (no server). This container exists so the same ./data mount can be
  # attached for one-off admin (optional). watgbridge mounts ./data directly.
  db:
    image: alpine:3.22
    command: ["sleep", "infinity"]
    volumes:
      - /opt/watgbridge/data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  watgbridge:
    build: .
    image: watgbridge:latest
    depends_on:
      - db
      - redis
    environment:
      - MODE=${MODE:-single}
      - TELEGRAM_MAIN_BOT_TOKEN=${TELEGRAM_MAIN_BOT_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID:-0}
      - TELEGRAM_TARGET_CHAT_ID=${TELEGRAM_TARGET_CHAT_ID:-0}
      - TELEGRAM_SKIP_SETTING_COMMANDS=${TELEGRAM_SKIP_SETTING_COMMANDS:-}
      - TELEGRAM_SKIP_STARTUP_MESSAGE=${TELEGRAM_SKIP_STARTUP_MESSAGE:-}
      - TELEGRAM_SILENT_CONFIRMATION=${TELEGRAM_SILENT_CONFIRMATION:-}
      - TELEGRAM_CONFIRMATION_TYPE=${TELEGRAM_CONFIRMATION_TYPE:-}
      - WHATSAPP_SESSION_NAME=${WHATSAPP_SESSION_NAME:-}
      - TIME_ZONE=${TIME_ZONE:-}
      - TIME_FORMAT=${TIME_FORMAT:-}
      - DEBUG_MODE=${DEBUG_MODE:-}
      - CONFIG_PATH=/data/config.yaml
      - WATGBRIDGE_VERSION=${WATGBRIDGE_VERSION:-}
      - WATG_SQLITE_MASTER_KEY=${WATG_SQLITE_MASTER_KEY:-}
      - REDIS_ADDR=redis:6379
    volumes:
      - /opt/watgbridge/data:/data
      - ./config.yaml:/data/config.yaml
    restart: unless-stopped

volumes:
  redis_data:
