# Pass creds via CLI: TELEGRAM_BOT_TOKEN=xxx TELEGRAM_OWNER_ID=123 TELEGRAM_TARGET_CHAT_ID=-100… docker compose up -d
# Or use a file: docker compose --env-file .env up -d
services:
  # SQLite is file-based (no server). This container holds the DB volume; the app reads/writes
  # the same files. There is no "sqlite" server image—unlike Postgres/MySQL, SQLite is embedded.
  db:
    image: alpine:3.22
    command: ["sleep", "infinity"]
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  watgbridge:
    build: .
    image: watgbridge:latest
    depends_on:
      - db
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID}
      - TELEGRAM_TARGET_CHAT_ID=${TELEGRAM_TARGET_CHAT_ID}
      - TELEGRAM_SKIP_SETTING_COMMANDS=${TELEGRAM_SKIP_SETTING_COMMANDS:-}
      - TELEGRAM_SKIP_STARTUP_MESSAGE=${TELEGRAM_SKIP_STARTUP_MESSAGE:-}
      - TELEGRAM_SILENT_CONFIRMATION=${TELEGRAM_SILENT_CONFIRMATION:-}
      - TELEGRAM_CONFIRMATION_TYPE=${TELEGRAM_CONFIRMATION_TYPE:-}
      - WHATSAPP_SESSION_NAME=${WHATSAPP_SESSION_NAME:-}
      - TIME_ZONE=${TIME_ZONE:-}
      - TIME_FORMAT=${TIME_FORMAT:-}
      - DEBUG_MODE=${DEBUG_MODE:-}
      - CONFIG_PATH=${CONFIG_PATH:-}
      - WATGBRIDGE_VERSION=${WATGBRIDGE_VERSION:-}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
